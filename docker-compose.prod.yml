services:
  gateway:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql://gateway_user:${DB_PASSWORD}@db:5432/gateway_db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gateway_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: gateway_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on: 
      - gateway

volumes:
  postgres_data: